          - paragraph [ref=e43]: Reception software fails when it optimizes for demos instead of volume. Staff need a queue board that keeps patient identity, appointment status, billing readiness, and admission context visible in one place.
          - paragraph [ref=e44]: The VHMS dashboard emphasizes short travel distance between actions, live queue signals, and fast context switching. That is why the queue board is tied to the same patient thread used by billing, admissions, communications, and print flows.
